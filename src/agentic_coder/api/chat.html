<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Coder Chat Ops</title>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: #ffffff;
      --ink: #132033;
      --muted: #516178;
      --accent: #0c7d70;
      --accent-2: #0f4ea6;
      --border: #d8e3f0;
      --ok: #0b6b3a;
      --warn: #8f5e00;
      --danger: #8b2242;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, #d8f0ee 0%, rgba(216, 240, 238, 0) 36%),
        radial-gradient(circle at 100% 0%, #d9e7ff 0%, rgba(217, 231, 255, 0) 42%),
        var(--bg);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(16, 42, 80, 0.08);
    }

    .panel {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: calc(100vh - 32px);
    }

    .title {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 9px 10px;
      color: var(--ink);
      font: inherit;
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      transition: transform .08s ease, filter .2s ease;
    }

    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
    }
    .btn.ghost {
      background: #f6f9ff;
      border-color: var(--border);
      color: #22314a;
    }
    .btn.warn {
      background: #fff7e7;
      color: var(--warn);
      border-color: #f2ddb1;
    }

    .stack { display: flex; flex-direction: column; gap: 8px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .mono { font-family: "IBM Plex Mono", "SFMono-Regular", monospace; }

    .sessions {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 44vh;
      padding: 6px;
      background: #f8fbff;
    }

    .session-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: #fff;
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .session-item.active {
      border-color: #9cc7ff;
      box-shadow: inset 0 0 0 1px #d8e9ff;
    }

    .main {
      min-height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-pill {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #f3f8ff;
    }

    .messages {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fbff;
      padding: 10px;
      overflow: auto;
      min-height: 44vh;
      max-height: 56vh;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      border-radius: 12px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user { border-left: 4px solid #3f8efc; }
    .msg.assistant { border-left: 4px solid #06a285; }
    .msg.system { border-left: 4px solid #7e57c2; }

    .runs {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      overflow: auto;
      max-height: 22vh;
    }

    .run-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fbfdff;
      font-size: 13px;
    }

    .state-awaiting_approval { color: var(--warn); }
    .state-succeeded { color: var(--ok); }
    .state-failed, .state-cancelled { color: var(--danger); }

    a { color: var(--accent-2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .panel, .main { min-height: auto; }
      .messages { max-height: 48vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card panel">
      <div class="stack">
        <h1 class="title">Chat Control Plane</h1>
        <p class="sub">Enterprise intake with persistent sessions and execution traceability.</p>
      </div>

      <div class="stack">
        <label class="sub" for="sessionTitle">Session Title</label>
        <input class="input" id="sessionTitle" placeholder="Fraud model tuning request" />
      </div>
      <div class="stack">
        <label class="sub" for="sessionRepo">Target Repository</label>
        <input class="input mono" id="sessionRepo" placeholder="owner/repo or repo" />
      </div>
      <div class="stack">
        <label class="sub" for="sessionApprovalIssue">Approval Issue # (optional)</label>
        <input class="input mono" id="sessionApprovalIssue" placeholder="123" />
      </div>
      <div class="stack">
        <label class="sub" for="operatorId">Operator Identity</label>
        <input class="input mono" id="operatorId" placeholder="alex.ops" />
      </div>
      <button class="btn primary" id="createSessionBtn">Create Session</button>
      <button class="btn ghost" id="refreshSessionsBtn">Refresh Sessions</button>

      <div class="sessions" id="sessionList">
        <div class="sub">No sessions yet.</div>
      </div>
    </section>

    <section class="card main">
      <div class="header">
        <div>
          <h2 class="title" id="activeTitle">Select a session</h2>
          <p class="sub mono" id="activeMeta">session: —</p>
        </div>
        <div class="row">
          <button class="btn warn" id="executeBtn">Execute To Branch + PR</button>
          <button class="btn ghost" id="refreshActiveBtn">Refresh</button>
          <span class="status-pill" id="executionStatus">idle</span>
        </div>
      </div>

      <div class="messages" id="messageList">
        <div class="sub">No messages.</div>
      </div>

      <div class="stack">
        <div class="row">
          <select class="select" id="messageRole">
            <option value="user">user</option>
            <option value="assistant">assistant</option>
            <option value="system">system</option>
          </select>
          <button class="btn primary" id="sendMessageBtn">Add Message</button>
        </div>
        <textarea class="textarea" id="messageContent" placeholder="Describe the request in detail. Include constraints and acceptance criteria."></textarea>
        <div class="runs" id="runList">
          <div class="sub">No run history yet.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      sessions: [],
      activeSessionId: null,
      token: null,
      operator: null,
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function ensureToken() {
      if (state.token) return state.token;
      const stored = localStorage.getItem("agentic_admin_token");
      if (stored) {
        state.token = stored;
        return stored;
      }
      const entered = window.prompt("Enter API admin token (X-Admin-Token):", "");
      if (entered) {
        state.token = entered.trim();
        localStorage.setItem("agentic_admin_token", state.token);
      }
      return state.token;
    }

    function ensureOperator() {
      const input = document.getElementById("operatorId");
      const current = input.value.trim();
      if (current) {
        state.operator = current;
        localStorage.setItem("agentic_operator", current);
        return current;
      }
      if (state.operator) return state.operator;
      const stored = localStorage.getItem("agentic_operator");
      if (stored) {
        state.operator = stored.trim();
        input.value = state.operator;
        return state.operator;
      }
      state.operator = "chat-ui";
      input.value = state.operator;
      localStorage.setItem("agentic_operator", state.operator);
      return state.operator;
    }

    async function api(path, options = {}) {
      const token = ensureToken();
      const operator = ensureOperator();
      const headers = { ...(options.headers || {}) };
      if (token) headers["X-Admin-Token"] = token;
      if (operator) headers["X-Operator"] = operator;
      if (options.body && !headers["Content-Type"]) {
        headers["Content-Type"] = "application/json";
      }
      const response = await fetch(path, { ...options, headers });
      const text = await response.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }
      if (!response.ok) {
        const detail = data?.detail ? JSON.stringify(data.detail) : JSON.stringify(data);
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    function setStatus(text) {
      document.getElementById("executionStatus").textContent = text;
    }

    function activeSession() {
      return state.sessions.find((s) => s.session_id === state.activeSessionId) || null;
    }

    function renderSessionList() {
      const root = document.getElementById("sessionList");
      if (!state.sessions.length) {
        root.innerHTML = '<div class="sub">No sessions yet.</div>';
        return;
      }
      root.innerHTML = state.sessions
        .map((session) => {
          const active = session.session_id === state.activeSessionId ? "active" : "";
          return `
            <button class="session-item ${active}" data-session-id="${session.session_id}">
              <div><strong>${escapeHtml(session.title)}</strong></div>
              <div class="mono sub">${escapeHtml(session.target_repository)}</div>
              <div class="sub">approval issue: ${escapeHtml(session.approval_issue_number || "none")}</div>
              <div class="sub">updated ${new Date(session.updated_at).toLocaleString()}</div>
            </button>
          `;
        })
        .join("");
      root.querySelectorAll(".session-item").forEach((button) => {
        button.addEventListener("click", async () => {
          state.activeSessionId = button.dataset.sessionId;
          renderSessionList();
          await refreshActiveSession();
        });
      });
    }

    function renderActiveHeader() {
      const session = activeSession();
      const titleEl = document.getElementById("activeTitle");
      const metaEl = document.getElementById("activeMeta");
      if (!session) {
        titleEl.textContent = "Select a session";
        metaEl.textContent = "session: —";
        return;
      }
      titleEl.textContent = session.title;
      const approval = session.approval_issue_number
        ? ` • approval issue: #${session.approval_issue_number}`
        : "";
      metaEl.textContent = `session: ${session.session_id} • repo: ${session.target_repository}${approval}`;
    }

    function renderMessages(messages) {
      const root = document.getElementById("messageList");
      if (!messages.length) {
        root.innerHTML = '<div class="sub">No messages.</div>';
        return;
      }
      root.innerHTML = messages
        .map((message) => `
          <div class="msg ${escapeHtml(message.role)}">
            <div><strong>${escapeHtml(message.role)}</strong> <span class="sub">${new Date(message.created_at).toLocaleString()}</span></div>
            <div>${escapeHtml(message.content)}</div>
          </div>
        `)
        .join("");
      root.scrollTop = root.scrollHeight;
    }

    function renderRuns(tasks) {
      const root = document.getElementById("runList");
      if (!tasks.length) {
        root.innerHTML = '<div class="sub">No run history yet.</div>';
        return;
      }
      root.innerHTML = tasks
        .map((task) => {
          const pr = task.pull_request || {};
          const prLink = pr.url
            ? `<a href="${escapeHtml(pr.url)}" target="_blank" rel="noopener">PR #${escapeHtml(pr.number)}</a>`
            : "none";
          return `
            <div class="run-item">
              <div><strong>${escapeHtml(task.title)}</strong></div>
              <div class="mono">task ${escapeHtml(task.task_id)}</div>
              <div class="state-${escapeHtml(task.state)}">state: ${escapeHtml(task.state)}</div>
              <div>run: ${escapeHtml(task.run?.run_id || "n/a")} (${escapeHtml(task.run?.status || "n/a")})</div>
              <div>pr: ${prLink}</div>
            </div>
          `;
        })
        .join("");
    }

    async function refreshSessions() {
      setStatus("loading sessions");
      const data = await api("/chat/sessions?limit=100");
      state.sessions = data.sessions || [];
      if (!state.activeSessionId && state.sessions.length) {
        state.activeSessionId = state.sessions[0].session_id;
      }
      if (
        state.activeSessionId &&
        !state.sessions.some((session) => session.session_id === state.activeSessionId)
      ) {
        state.activeSessionId = null;
      }
      renderSessionList();
      renderActiveHeader();
      setStatus("ready");
    }

    async function refreshActiveSession() {
      const session = activeSession();
      renderActiveHeader();
      if (!session) return;
      setStatus("loading active");
      const [messagesData, runsData] = await Promise.all([
        api(`/chat/sessions/${session.session_id}/messages?limit=500`),
        api(`/chat/sessions/${session.session_id}/runs?limit=50`),
      ]);
      renderMessages(messagesData.messages || []);
      renderRuns(runsData.tasks || []);
      setStatus("ready");
    }

    async function createSession() {
      const title = document.getElementById("sessionTitle").value.trim();
      const targetRepository = document.getElementById("sessionRepo").value.trim();
      const approvalIssueRaw = document.getElementById("sessionApprovalIssue").value.trim();
      const approvalIssue = approvalIssueRaw ? Number.parseInt(approvalIssueRaw, 10) : null;
      if (!title || !targetRepository) {
        window.alert("Session title and target repository are required.");
        return;
      }
      if (approvalIssueRaw && (!Number.isInteger(approvalIssue) || approvalIssue <= 0)) {
        window.alert("Approval issue must be a positive integer.");
        return;
      }
      setStatus("creating session");
      await api("/chat/sessions", {
        method: "POST",
        body: JSON.stringify({
          title,
          target_repository: targetRepository,
          approval_issue_number: approvalIssue,
        }),
      });
      document.getElementById("sessionTitle").value = "";
      await refreshSessions();
      await refreshActiveSession();
    }

    async function sendMessage() {
      const session = activeSession();
      if (!session) {
        window.alert("Select a session first.");
        return;
      }
      const role = document.getElementById("messageRole").value;
      const contentEl = document.getElementById("messageContent");
      const content = contentEl.value.trim();
      if (!content) {
        window.alert("Message content is required.");
        return;
      }
      setStatus("saving message");
      await api(`/chat/sessions/${session.session_id}/messages`, {
        method: "POST",
        body: JSON.stringify({ role, content }),
      });
      contentEl.value = "";
      await refreshSessions();
      await refreshActiveSession();
    }

    async function executeSession() {
      const session = activeSession();
      if (!session) {
        window.alert("Select a session first.");
        return;
      }
      const approvalIssueRaw = document.getElementById("sessionApprovalIssue").value.trim();
      const approvalIssue = approvalIssueRaw ? Number.parseInt(approvalIssueRaw, 10) : null;
      if (approvalIssueRaw && (!Number.isInteger(approvalIssue) || approvalIssue <= 0)) {
        window.alert("Approval issue must be a positive integer.");
        return;
      }
      setStatus("executing");
      const result = await api(`/chat/sessions/${session.session_id}/execute`, {
        method: "POST",
        body: JSON.stringify({ approval_issue_number: approvalIssue }),
      });
      setStatus(result.reused ? "reused active task" : "execution enqueued");
      await refreshSessions();
      await refreshActiveSession();
    }

    document.getElementById("createSessionBtn").addEventListener("click", () => {
      createSession().catch((error) => {
        setStatus("error");
        window.alert(error.message);
      });
    });

    document.getElementById("refreshSessionsBtn").addEventListener("click", () => {
      refreshSessions()
        .then(refreshActiveSession)
        .catch((error) => {
          setStatus("error");
          window.alert(error.message);
        });
    });

    document.getElementById("refreshActiveBtn").addEventListener("click", () => {
      refreshActiveSession().catch((error) => {
        setStatus("error");
        window.alert(error.message);
      });
    });

    document.getElementById("sendMessageBtn").addEventListener("click", () => {
      sendMessage().catch((error) => {
        setStatus("error");
        window.alert(error.message);
      });
    });

    document.getElementById("executeBtn").addEventListener("click", () => {
      executeSession().catch((error) => {
        setStatus("error");
        window.alert(error.message);
      });
    });

    document.getElementById("operatorId").addEventListener("change", () => {
      ensureOperator();
    });

    ensureOperator();
    refreshSessions()
      .then(refreshActiveSession)
      .catch((error) => {
        setStatus("error");
        window.alert(error.message);
      });

    window.setInterval(() => {
      if (!state.activeSessionId) return;
      refreshSessions()
        .then(refreshActiveSession)
        .catch(() => {});
    }, 15000);
  </script>
</body>
</html>
