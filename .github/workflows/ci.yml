name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Pytest
        run: python -m pytest tests -q

  smoke:
    runs-on: ubuntu-latest
    needs: regression
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up --build -d postgres redis api

      - name: Wait for Postgres
        run: |
          for attempt in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U agentic_coder -d agentic_coder; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color --tail=200 postgres
          exit 1

      - name: Apply migrations
        run: docker compose run --rm api python -m alembic upgrade head

      - name: Run smoke suite
        run: docker compose run --rm -e BASE_URL=http://api:8080 api python scripts/smoke_test.py --base-url http://api:8080 --target-repository predictiv --wait-seconds 180

      - name: API logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300 api

      - name: Stop stack
        if: always()
        run: docker compose down -v
